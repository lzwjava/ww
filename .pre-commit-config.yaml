repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        additional_dependencies: ["python-dotenv", "Pillow", "beautifulsoup4", "readability-lxml", "requests"]
        exclude: >-
          (?x)^ww/(
            agent/|audio/|auto_ss_config/|bot/|clash/|cloudflare/|
            conversation_upload/|crawler/|embedding/|gif/|graph/|
            image/(screenshot|remove_bg|image_compress)\.py|
            japanese/|java/|kalman/|langchain_test/|linear/|
            macos/(list_fonts|toast)\.py|mmlu/|network/|networkx/|
            photo/|pico/|pl/|plot/|selenium/|social/|supabase/|
            tooluse/|torch_llm/|trading/|try/|utils/decode_jwt\.py|
            video/|wandbrun/
          )
